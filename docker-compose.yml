      - ../vso_agent/data:/app/data:ro
      - vso_vector_db:/app/vector_db
    networks:
      - sspa_infra
    healthcheck:
      disable: true

volumes:
  ollama_vso_storage:
    name: sspa_ollama_vso_storage
  vso_vector_db:
    name: sspa_vso_vector_db

