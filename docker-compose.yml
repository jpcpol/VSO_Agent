# ==============================================================================
# SSPA VSO — Virtual Security Officer
# Stack independiente — deploya aparte del SOC principal
#
# Uso:
#   cp .env.example .env
#   # Editar .env con TELEGRAM_BOT_TOKEN y ajustes opcionales
#   docker compose up -d --build
#
# Dependencias externas: ninguna (stack autocontenido)
# Red interna:  vso_net (bridge, privada)
# Acceso saliente: Telegram Bot API (HTTPS) + descarga del modelo Ollama
# ==============================================================================

services:

  # ── Ollama: motor LLM on-premise ──────────────────────────────────────────
  ollama-vso:
    image: ollama/ollama:latest
    container_name: vso_ollama
    restart: unless-stopped
    mem_limit: 5g
    volumes:
      - ollama_vso_storage:/root/.ollama
    networks:
      - vso_net
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 30s

  # ── Init: descarga el modelo una sola vez ─────────────────────────────────
  vso-model-puller:
    image: ollama/ollama:latest
    container_name: vso_model_puller
    depends_on:
      ollama-vso:
        condition: service_healthy
    restart: "no"
    environment:
      OLLAMA_HOST: http://ollama-vso:11434
      MODEL_NAME:  ${VSO_MODEL_NAME:-llama3.2:3b}
    entrypoint: sh -c "ollama pull $${MODEL_NAME:-llama3.2:3b} && echo 'Modelo VSO listo.'"
    volumes:
      - ollama_vso_storage:/root/.ollama
    networks:
      - vso_net

  # ── Bot VSO: RAG + Telegram ────────────────────────────────────────────────
  vso-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vso_bot
    restart: unless-stopped
    mem_limit: 4g
    depends_on:
      ollama-vso:
        condition: service_healthy
      vso-model-puller:
        condition: service_completed_successfully
    env_file:
      - path: .env
        required: false
    environment:
      OLLAMA_API_BASE: http://ollama-vso:11434
      MODEL_NAME:      ${VSO_MODEL_NAME:-llama3.2:3b}
      RAG_K_DOCS:      ${VSO_RAG_K_DOCS:-3}
      CHUNK_SIZE:      ${VSO_CHUNK_SIZE:-600}
      CHUNK_OVERLAP:   ${VSO_CHUNK_OVERLAP:-80}
      CACHE_TTL:       ${VSO_CACHE_TTL:-3600}
      RATE_LIMIT_MAX:  ${VSO_RATE_LIMIT_MAX:-10}
      RATE_LIMIT_WINDOW: ${VSO_RATE_LIMIT_WINDOW:-60}
    volumes:
      - ./data:/app/data:ro
      - vso_vector_db:/app/vector_db
    networks:
      - vso_net
    # El Dockerfile define su propio HEALTHCHECK (test -f /tmp/vso_running)
    # Se habilita aquí explícitamente para visibilidad en `docker ps`
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/vso_running || exit 1"]
      interval: 60s
      timeout: 10s
      start_period: 180s
      retries: 3

volumes:
  ollama_vso_storage:
    name: vso_ollama_storage
  vso_vector_db:
    name: vso_vector_db

networks:
  vso_net:
    driver: bridge
